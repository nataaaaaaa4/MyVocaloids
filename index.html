<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Favorite Vocaloid Songs</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(135deg, #40e0d0, #a0f0f0, #ffd6ec);
    overflow-x: hidden;
}

/* SPARKLE */
.sparkle {
    position: fixed;
    width: 5px;
    height: 5px;
    background: white;
    border-radius: 50%;
    animation: sparkleMove linear infinite;
}

@keyframes sparkleMove {
    from {transform: translateY(-10px);}
    to {transform: translateY(100vh);}
}

/* HEADER */
header {
    text-align: center;
    padding: 40px;
    color: white;
}

.title {
    font-size: 2.5em;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}

/* TYPE EFFECT */
.typing {
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    animation: typing 4s steps(40,end) forwards;
}

@keyframes typing {
    from {width:0}
    to {width:100%}
}

.desc {
    font-size: 0.9em;
}

/* NAV */
nav {
    text-align: center;
}

nav a {
    margin: 0 10px;
    color: white;
    cursor: pointer;
}

/* CARDS */
.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    padding: 20px;
}

.card {
    width: 260px;
    padding: 15px;
    border-radius: 25px;
    text-align: center;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #40e0d0;
}

.card img {
    width: 100%;
    border-radius: 20px;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 10px;
    border-radius: 20px;
    border: none;
    background: #40e0d0;
    color: white;
    cursor: pointer;
}

button:hover {
    box-shadow: 0 0 10px #40e0d0;
}

/* MUSIC PLAYER */
.player {
    margin-top: 10px;
}

/* LOGIN */
.login-box {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: white;
    padding: 20px;
    border-radius: 20px;
}

input {
    display: block;
    margin: 5px auto;
    padding: 8px;
    border-radius: 10px;
}

/* DARK MODE */
.dark {
    background: linear-gradient(135deg,#1e1e2f,#2a2a40);
    color: white;
}

</style>
</head>

<body>

<header>
    <h1 class="title typing">My Favorite Vocaloid Songs 💙✨</h1>
    <p class="desc">Honestly i just picked random songs, could be overrated. If you disagree sorry not sorry.</p>
</header>

<nav>
    <a onclick="scrollToSongs()">Songs</a>
    <a onclick="openLogin()">Login</a>
    <a onclick="toggleDark()">Dark Mode</a>
</nav>

<div class="container" id="songs">

    <div class="card">
        <img src="https://i.ibb.co.com/fVJnNhds/image.png">
        <h3>⭐ Inochi Bakkari</h3>
        <button onclick="visit('https://youtu.be/YDnZFwlZa1g')">Visit 💙</button>
        <div class="player">
            <iframe width="100%" height="150" src="https://www.youtube.com/embed/YDnZFwlZa1g"></iframe>
        </div>
    </div>

    <div class="card">
        <img src="https://i.ibb.co.com/DsnrdkY/image.png">
        <h3>Rakuraku anrakushi</h3>
        <button onclick="visit('https://youtu.be/1gnISlt_mhU')">Visit 💙</button>
        <div class="player">
            <iframe width="100%" height="150" src="https://www.youtube.com/embed/1gnISlt_mhU"></iframe>
        </div>
    </div>

    <div class="card">
        <img src="https://i.ibb.co.com/N254ZdGh/image.png">
        <h3>Netsu ijou</h3>
        <button onclick="visit('https://youtu.be/b2NTglk9tvI')">Visit 💙</button>
        <div class="player">
            <iframe width="100%" height="150" src="https://www.youtube.com/embed/b2NTglk9tvI"></iframe>
        </div>
    </div>

</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
    <h3>Login 💌</h3>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button onclick="alert('Login success 💙')">Login</button>
    <button onclick="closeLogin()">Close</button>
</div>

<script>
// VISIT
function visit(link){
    window.open(link, "_blank");
}

// LOGIN
function openLogin(){
    document.getElementById("loginBox").style.display = "block";
}

function closeLogin(){
    document.getElementById("loginBox").style.display = "none";
}

// SCROLL
function scrollToSongs(){
    document.getElementById("songs").scrollIntoView({behavior:"smooth"});
}

// DARK MODE
function toggleDark(){
    document.body.classList.toggle("dark");
}

// SPARKLES
for(let i=0;i<40;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(s);
}
</script>

</body>
</html>
